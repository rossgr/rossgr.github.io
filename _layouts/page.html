---
layout: default
---
<div class="page-header">
  <div class="wrap">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="hero__bio">{{ page.subtitle }}</p>{% endif %}
  </div>
</div>

<div class="wrap">
  <div class="entry-content entry-content--page">
    {{ content }}
  </div>
</div>
