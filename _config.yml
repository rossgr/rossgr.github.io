# ─────────────────────────────────────────────
# Site configuration
# Edit the values below to personalise the site.
# ─────────────────────────────────────────────

title: "@rossgr"
tagline: "BSc (Hons) Cyber Security Graduate (First-Class) | Offensive Security Enthusiast"
description: >-
  Personal site featuring security writeups, research papers and
  projects.

# This MUST match your GitHub Pages URL.
# If your repo is named "username.github.io", set baseurl to ""
# If your repo is named anything else (e.g. "my-blog"), set baseurl to "/my-blog"
url: "https://rossgr.github.io"
baseurl: ""

# Author / contact details — shown in the bio card and footer
author:
  name: "Ross Greenall"
  role: "BSc (Hons) Cyber Security Graduate (First-Class)"
  bio: >-
    Cyber security graduate with a focus on offensive security. I write up CTF challenges,
    document personal projects and share research as I continue to learn and grow in the field.
  location: "Manchester,United Kingdom"
  avatar: "/assets/images/avatar.png"               # set to e.g. /assets/images/avatar.jpg once you've added a photo
  email: "rossgreenall@gmail.com"
  github: "rossgr"
  linkedin: "ross-greenall-a745a3294"
  twitter: ""        # leave blank to hide
  tryhackme: "https://tryhackme.com/p/rossgr"       # leave blank to hide
  hackthebox: "@rossgr"      # leave blank to hide
  cv: ""              # path to a PDF CV, e.g. /assets/cv.pdf — leave blank to hide

# ─────────────────────────────────────────────
# Build settings — leave as-is unless you know what you're doing
# ─────────────────────────────────────────────

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections power the three content types on this site.
# Add new content by dropping a markdown file into the matching
# folder — no other configuration required.
collections:
  writeups:
    output: true
    permalink: /writeups/:path/
  projects:
    output: true
    permalink: /projects/:path/
  papers:
    output: true
    permalink: /papers/:path/

# Default front matter applied to every file, so you don't have to
# repeat "layout: ..." in every post.
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "writeup"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "paper"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
